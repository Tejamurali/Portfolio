<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Responsive Header</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
            width: 100%; /* Non-responsive width */
        }
        header svg{
            display: none;
        }
        .logo {
            font-size: 36px; /* Fixed size */
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            margin: 0 15px; /* Fixed spacing */
            color: white;
            text-decoration: none;
            font-size: 18px; /* Fixed size */
        }
        @media(max-width:360px){
            nav a{
                font-size: 14px;
            }
            .logo{
                font-size: 30px;
            }

        }
        @media(max-width:309px){
            nav a{
                font-size: 10px;
            }
            .logo{
                font-size: 25px;
            }
        }
        @media(max-width:259px){
            .logo{
                font-size: 25px;
                display: flex;
                justify-content: flex-start;
                
            }
            nav a{
                display: none;
            }
            header{
                display: flex;
                justify-content: space-between;
            }
            header svg{
                display: block;
                margin-right: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">My Website</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20px" heigth="20px">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>

        </nav>
    </header>
</body>
</html>
